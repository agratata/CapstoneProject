    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Interactive UI Simulation Logic
        function simulateFileUpload() {
            const fileInput = document.getElementById('cv-file-input');
            const dropzone = document.getElementById('upload-dropzone');
            const loadingState = document.getElementById('agent-loading-state');
            const profileContent = document.getElementById('profile-data-display');
            const validationError = document.getElementById('validation-error-banner');

            // Reset error states
            validationError.classList.add('hidden');

            if (!fileInput.files.length) return;
            
            const file = fileInput.files[0];
            // Component B Server-End Validation Simulation: Check if PDF or DOCX
            if (!file.name.endsWith('.pdf') && !file.name.endsWith('.docx')) {
                validationError.classList.remove('hidden');
                document.getElementById('error-text').innerText = "Invalid file type. Component B validation rules restrict uploads strictly to PDF or DOCX format.";
                fileInput.value = '';
                return;
            }

            // Component A Front-End Feedback Loop Transition
            dropzone.classList.add('hidden');
            loadingState.classList.remove('hidden');

            // Simulate Agent Processing Delay (3 Seconds)
            setTimeout(() => {
                loadingState.classList.add('hidden');
                profileContent.classList.remove('hidden');
            }, 3000);
        }

        function resetUpload() {
            document.getElementById('profile-data-display').add('hidden');
            document.getElementById('upload-dropzone').classList.remove('hidden');
            document.getElementById('cv-file-input').value = '';
            location.reload();
        }
    </script>
</head>
